name: ZENTRA to WindGuru bridge

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: git clone --depth 50 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" repo

      - name: Install dependencies
        run: python3 -m pip install --user --quiet requests

      - name: Run bridge
        env:
          ZENTRA_TOKEN: ${{ secrets.ZENTRA_TOKEN }}
          ZENTRA_DEVICE_SN: ${{ secrets.ZENTRA_DEVICE_SN }}
          WINDGURU_UID: ${{ secrets.WINDGURU_UID }}
          WINDGURU_PASSWORD: ${{ secrets.WINDGURU_PASSWORD }}
          STATION_ELEVATION_M: ${{ secrets.STATION_ELEVATION_M }}
        run: python3 repo/windguru_bridge.py

      - name: Keepalive (prevents schedule auto-disable)
        run: |
          cd repo
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $(( (now - last) / 86400 )) -ge 50 ]; then
            git config user.name "keepalive-bot"
            git config user.email "keepalive@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: refresh scheduled workflow"
            git push
          fi
